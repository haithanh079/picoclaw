# Docker Compose for mem0 semantic memory server
#
# Usage:
#   cd docker
#   OPENAI_API_KEY=sk-... docker compose -f docker-compose.mem0.yml up -d
#
# This starts:
#   - Qdrant vector store on port 6333
#   - mem0 REST API server on port 8080 (forwarded from internal 8000)
#
# Once running, configure picoclaw:
#   "mem0": { "enabled": true, "api_url": "http://localhost:8080" }
#
# API docs available at: http://localhost:8080/docs

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mem0:
    image: mem0ai/mem0:latest
    ports:
      - "8080:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MEM0_VECTOR_STORE_PROVIDER=qdrant
      - MEM0_VECTOR_STORE_CONFIG_HOST=qdrant
      - MEM0_VECTOR_STORE_CONFIG_PORT=6333
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
